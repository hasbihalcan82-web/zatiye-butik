<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Zatiye'nin Butiği - Amasya</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { background: #000; color: #d4af37; font-family: 'Times New Roman', serif; margin: 0; text-align: center; }
        header { padding: 80px 20px; border-bottom: 1px solid #333; }
        h1 { font-size: 3.5em; letter-spacing: 10px; margin: 0; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 40px; }
        .product-card { border: 1px solid #333; padding: 20px; background: #0a0a0a; }
        .product-card img { width: 100%; height: auto; border-radius: 5px; }
        .btn { background: #d4af37; color: #000; padding: 10px 20px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>ZATİYE'NİN BUTİĞİ</h1>
        <p>Amasya'nın En Şık Adresi</p>
    </header>
    <div id="products" class="product-grid">
        <p>Ürünler yükleniyor...</p>
    </div>
    <script>
        // Netlify Identity ayarı
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
                }
            });
        }
    </script>
</body>
</html>
