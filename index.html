<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zatiye'nin Butiği - Amasya</title>
    <style>
        body { background-color: #000; color: #d4af37; font-family: 'Times New Roman', serif; margin: 0; padding: 0; }
        header { padding: 50px; text-align: center; border-bottom: 1px solid #333; }
        h1 { letter-spacing: 7px; text-transform: uppercase; font-size: 2.5em; margin: 0; }
        .container { max-width: 1100px; margin: 40px auto; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .product-card { border: 1px solid #333; padding: 20px; text-align: center; transition: 0.3s; }
        .product-card:hover { border-color: #d4af37; }
        .product-img { width: 100%; height: 350px; background-color: #1a1a1a; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; color: #444; }
        .buy-btn { background-color: #d4af37; color: #000; padding: 12px 25px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; border-radius: 3px; }
        .price { font-size: 1.4em; display: block; margin: 10px 0; }
    </style>
</head>
<body>

<header>
    <h1>ZATİYE'NİN BUTİĞİ</h1>
    <p style="color: #888;">Amasya - Kalite ve Zarafetin Buluştuğu Nokta</p>
</header>

<div class="container">
    <div class="product-grid">
        <div class="product-card">
            <div class="product-img">Ürün Fotoğrafı Gelecek</div>
            <h3>Klasik Siyah Ceket</h3>
            <span class="price">1.250 TL</span>
            <a href="#" class="buy-btn">ŞİMDİ SATIN AL</a>
        </div>

        <div class="product-card">
            <div class="product-img">Ürün Fotoğrafı Gelecek</div>
            <h3>Vizon Kaşe Kaban</h3>
            <span class="price">2.450 TL</span>
            <a href="#" class="buy-btn">ŞİMDİ SATIN AL</a>
        </div>
    </div>
</div>

<footer style="text-align:center; padding: 50px; border-top: 1px solid #333; color: #666;">
    &copy; 2026 Zatiye'nin Butiği - Amasya
</footer>

</body>
</html>
