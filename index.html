<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zatiye'nin Butiği | Amasya</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        /* Ultra Lüks Minimalist Stil */
        body { background: #000; color: #d4af37; font-family: 'Times New Roman', serif; margin: 0; padding: 0; line-height: 1.6; }
        header { padding: 80px 20px; text-align: center; border-bottom: 1px solid #1a1a1a; background: linear-gradient(to bottom, #0a0a0a, #000); }
        h1 { font-size: 3.5em; letter-spacing: 12px; margin: 0; font-weight: 300; text-transform: uppercase; }
        .tagline { letter-spacing: 5px; color: #888; font-size: 0.9em; margin-top: 10px; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }
        
        /* Ürün Kartları Düzeni */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 50px; }
        .product-card { background: #050505; border: 1px solid #111; padding: 15px; transition: all 0.4s ease; text-align: center; position: relative; }
        .product-card:hover { border-color: #d4af37; transform: translateY(-10px); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1); }
        
        .product-card img { width: 100%; height: 450px; object-fit: cover; filter: grayscale(20%); transition: 0.4s; }
        .product-card:hover img { filter: grayscale(0%); }
        
        .product-info { padding: 20px 0; }
        .product-title { font-size: 1.5em; margin: 10px 0; letter-spacing: 2px; text-transform: capitalize; color: #fff; }
        .product-price { font-size: 1.3em; color: #d4af37; font-weight: bold; margin-bottom: 20px; display: block; }
        
        /* Şık Buton */
        .btn-whatsapp { 
            background: transparent; border: 1px solid #d4af37; color: #d4af37; 
            padding: 12px 30px; text-decoration: none; font-size: 0.9em; 
            letter-spacing: 2px; font-weight: bold; transition: 0.3s; display: inline-block; 
        }
        .btn-whatsapp:hover { background: #d4af37; color: #000; }

        footer { padding: 40px; border-top: 1px solid #1a1a1a; color: #555; font-size: 0.8em; letter-spacing: 2px; }
        
        /* Yükleme Ekranı */
        #loading { font-size: 1.2em; letter-spacing: 3px; }
    </style>
</head>
<body>

    <header>
        <h1>ZATİYE'NİN BUTİĞİ</h1>
        <div class="tagline">AMASYA • ÖZEL KOLEKSİYON</div>
    </header>

    <div class="container">
        <div id="product-list" class="product-grid">
            <div id="loading">Koleksiyon Hazırlanıyor...</div>
        </div>
    </div>

    <footer>
        &copy; 2026 ZATİYE'NİN BUTİĞİ - TÜM HAKLARI SAKLIDIR.
    </footer>

    <script>
        // Ürünleri GitHub'dan Çeken Fonksiyon
        async function fetchProducts() {
            const container = document.getElementById('product-list');
            const repoOwner = "hasbihalcan82-web"; 
            const repoName = "zatiye-butik";
            const folderPath = "content/urunler";
            
            try {
                // 1. Klasördeki dosya listesini al
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`);
                const files = await response.json();
                
                if (!files || files.length === 0) {
                    container.innerHTML = "<p>Henüz ürün eklenmemiş.</p>";
                    return;
                }

                container.innerHTML = ""; // Yükleniyor yazısını kaldır

                // 2. Her dosyayı oku
                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const contentRes = await fetch(file.download_url);
                        const text = await contentRes.text();
                        
                        // Markdown içeriğinden verileri ayıkla (Regex ile)
                        const title = text.match(/title:\s*["']?(.*?)["']?\r?\n/)?.[1] || "Şık Ürün";
                        const price = text.match(/price:\s*(.*)/)?.[1] || "Fiyat Sorun";
                        const image = text.match(/image:\s*["']?(.*?)["']?\r?\n/)?.[1] || "";

                        // Kartı oluştur
                        const card = `
                            <div class="product-card">
                                <img src="${image}" alt="${title}">
                                <div class="product-info">
                                    <div class="product-title">${title}</div>
                                    <span class="product-price">${price} TL</span>
                                    <a href="https://wa.me/905XXXXXXXXX?text=Merhaba, ${title} ürününüz hakkında bilgi alabilir miyim?" target="_blank" class="btn-whatsapp">SİPARİŞ VER</a>
                                </div>
                            </div>
                        `;
                        container.innerHTML += card;
                    }
                }
            } catch (error) {
                console.error("Hata:", error);
                container.innerHTML = "<p>Ürünler şu an yüklenemiyor.</p>";
            }
        }

        // Sayfa açıldığında ürünleri getir
        window.onload = fetchProducts;
    </script>
</body>
</html>
