<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Zatiye'nin Butiği - Amasya</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { background: #000; color: #d4af37; font-family: serif; margin: 0; text-align: center; }
        header { padding: 60px 20px; border-bottom: 1px solid #333; background: url('https://images.unsplash.com/photo-1558769132-cb1aea458c5e?q=80&w=1000&auto=format&fit=crop') center/cover; background-blend-mode: overlay; background-color: rgba(0,0,0,0.7); }
        h1 { font-size: 3em; letter-spacing: 8px; margin: 0; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 50px; max-width: 1200px; margin: 0 auto; }
        .product-card { border: 1px solid #333; padding: 20px; background: #0a0a0a; transition: 0.3s; }
        .product-card:hover { border-color: #d4af37; }
        .product-card img { width: 100%; height: 300px; object-fit: cover; }
        .price { font-size: 1.5em; display: block; margin: 15px 0; color: #fff; }
        .buy-btn { background: #d4af37; color: #000; padding: 10px 20px; text-decoration: none; font-weight: bold; display: inline-block; }
        footer { padding: 40px; color: #555; border-top: 1px solid #333; }
    </style>
</head>
<body>

<header>
    <h1>ZATİYE'NİN BUTİĞİ</h1>
    <p>Amasya - Zamansız Şıklık</p>
</header>

<div id="urun-listesi" class="product-grid">
    <p style="color: #666;">Ürünler yükleniyor veya henüz ürün eklenmedi...</p>
</div>

<footer>&copy; 2026 Zatiye'nin Butiği</footer>

<script>
    // Netlify Identity Giriş Takibi
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
        }
      });
    }

    // Admin panelinden gelen ürünleri çekme simülasyonu/mantığı
    // Not: Gerçek listeleme için ürün ekledikten sonra burayı biraz daha detaylandıracağız.
</script>
</body>
</html>
