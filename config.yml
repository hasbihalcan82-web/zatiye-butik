backend:
  name: git-gateway
  branch: main

media_folder: "images" # Ürün resimlerinin yükleneceği klasör
public_folder: "/images"

collections:
  - name: "urunler"
    label: "Ürünler"
    folder: "content/urunler" # Ürün bilgilerinin saklanacağı yer
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Ürün Adı", name: "title", widget: "string"}
      - {label: "Fiyat", name: "price", widget: "number"}
      - {label: "Ürün Açıklaması", name: "body", widget: "markdown"}
      - {label: "Ürün Görseli", name: "image", widget: "image"}
