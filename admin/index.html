<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Zatiye'nin Butiği - Amasya</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { background: #000; color: #d4af37; font-family: serif; text-align: center; margin: 0; }
        header { padding: 100px 20px; border-bottom: 1px solid #333; }
        h1 { font-size: 3em; letter-spacing: 10px; }
        .btn { background: #d4af37; color: #000; padding: 15px 30px; border: none; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>ZATİYE'NİN BUTİĞİ</h1>
        <p>Amasya'nın En Şık Adresi</p>
        <a href="/admin/" class="btn">YÖNETİM PANELİNE GİT</a>
    </header>
    
    <div style="padding: 50px;">
        <p>Ürünler birazdan burada belirecek...</p>
    </div>

    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
          }
        });
      }
    </script>
</body>
</html>
